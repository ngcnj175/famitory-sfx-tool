<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FAMITORY SFX Tool</title>
<style>
  :root {
    --bg: #1a1a24;
    --panel: #24242f;
    --panel2: #2f2f3d;
    --text: #e0e0e8;
    --dim: #8888a0;
    --accent: #6de08a;
    --accent2: #4dd0e1;
    --danger: #ff6b6b;
    --border: #3a3a4a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 20px;
    background: var(--bg); color: var(--text);
    font-family: 'Consolas', 'Menlo', monospace;
    font-size: 13px;
  }
  h1 { margin: 0 0 12px; font-size: 18px; color: var(--accent); }
  .panel {
    background: var(--panel2); border: 1px solid var(--border);
    padding: 20px; border-radius: 8px;
  }
  .row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .row label {
    display: inline-block; width: 130px; color: var(--dim); font-size: 12px;
  }
  .row input[type="range"] { flex: 1; touch-action: none; }
  .row input[type="number"], .row select {
    width: 90px; padding: 4px 6px; background: var(--bg);
    color: var(--text); border: 1px solid var(--border); border-radius: 4px;
    font-family: inherit; font-size: 12px;
    touch-action: manipulation;
  }
  .row select { width: 120px; }
  .btn {
    padding: 8px 16px; background: var(--accent); color: #000;
    border: none; border-radius: 4px; cursor: pointer;
    font-family: inherit; font-weight: bold; font-size: 13px;
    touch-action: manipulation;
  }
  .btn:hover { filter: brightness(1.1); }
  .btn.secondary { background: var(--accent2); }
  .btn.danger { background: var(--danger); color: #fff; }
  .btn.small { padding: 4px 10px; font-size: 11px; }
  .btn-row { display: flex; gap: 8px; margin: 0 0 16px; flex-wrap: wrap; }
  .notes-list {
    background: var(--bg); border: 1px solid var(--border);
    padding: 8px; border-radius: 4px; margin-top: 4px;
  }
  .note-row {
    display: flex; gap: 4px; align-items: center; margin-bottom: 4px;
  }
  .note-row input { width: 42px; padding: 2px 2px; background: var(--panel2);
    color: var(--text); border: 1px solid var(--border); border-radius: 3px;
    font-family: inherit; font-size: 16px; touch-action: none; cursor: ns-resize; }
  .note-row .idx { width: 24px; color: var(--dim); font-size: 11px; }
  .hint { color: var(--dim); font-size: 11px; margin-top: 4px; }
  .preset-bar {
    display: flex; align-items: center; gap: 8px; margin-bottom: 12px;
    padding: 10px; background: var(--bg); border-radius: 4px;
  }
  .preset-bar select { flex: 1; }
  .section {
    border: 1px solid var(--border); border-radius: 6px;
    margin-bottom: 12px; background: var(--panel);
  }
  .section-header {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 12px; cursor: pointer; user-select: none;
    color: var(--accent); font-weight: bold; font-size: 14px;
    touch-action: manipulation;
  }
  .section-header input[type="checkbox"] {
    width: 18px; height: 18px; accent-color: var(--accent);
    touch-action: manipulation;
  }
  .section-body {
    padding: 12px; border-top: 1px solid var(--border);
  }
  .section.disabled .section-header { color: var(--dim); }
  .section.disabled .section-body { display: none; }
  .toast {
    position: fixed; top: 20px; right: 20px; background: var(--accent);
    color: #000; padding: 8px 16px; border-radius: 4px; font-weight: bold;
    opacity: 0; transition: opacity 0.2s; pointer-events: none;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
<h1>FAMITORY SFX Tool</h1>

<div class="panel">
  <div class="preset-bar">
    <label style="color:var(--dim);">プリセット:</label>
    <select id="preset">
      <optgroup label="Unified（統合）" data-kind="unified"></optgroup>
      <optgroup label="FreqSweep" data-kind="sweep"></optgroup>
      <optgroup label="MultiNote" data-kind="multi"></optgroup>
      <optgroup label="NoiseSE" data-kind="noise"></optgroup>
    </select>
    <button class="btn small secondary" onclick="loadPreset()">読込</button>
  </div>
  <div class="btn-row">
    <button class="btn" onclick="playAll()">▶ 再生</button>
    <button class="btn secondary" onclick="copyAll()">📋 JSONコピー</button>
    <button class="btn small" onclick="randomizeAll()">🎲 ランダム</button>
  </div>

  <!-- =============== FreqSweep =============== -->
  <div class="section" id="section-sweep">
    <label class="section-header">
      <input type="checkbox" id="use-sweep" checked>
      FreqSweep（スイープ）
    </label>
    <div class="section-body">
      <div class="row">
        <label>startFreq (Hz)</label>
        <input type="range" id="sw-startFreq" min="20" max="4000" step="1" value="200">
        <input type="number" id="sw-startFreq-n" value="200">
      </div>
      <div class="row">
        <label>endFreq (Hz)</label>
        <input type="range" id="sw-endFreq" min="20" max="4000" step="1" value="600">
        <input type="number" id="sw-endFreq-n" value="600">
      </div>
      <div class="row">
        <label id="sw-duration-label">duration (秒)</label>
        <input type="range" id="sw-duration" min="0.01" max="1" step="0.005" value="0.1">
        <input type="number" id="sw-duration-n" step="0.005" value="0.1">
      </div>
      <div class="row">
        <label>repeatCount</label>
        <input type="range" id="sw-repeatCount" min="1" max="20" step="1" value="1">
        <input type="number" id="sw-repeatCount-n" value="1">
      </div>
      <div class="hint" id="sw-total-hint" style="margin-left:142px; display:none;">
        総時間 = segmentDuration × repeatCount = <span id="sw-total">0.00</span> 秒
      </div>
      <div class="row">
        <label>waveType</label>
        <select id="sw-waveType">
          <option value="square">square</option>
          <option value="sine">sine</option>
          <option value="triangle">triangle</option>
          <option value="sawtooth">sawtooth</option>
        </select>
      </div>
      <div class="row">
        <label>duty（squareのみ）</label>
        <select id="sw-duty">
          <option value="">なし（50%）</option>
          <option value="0.125">0.125 (12.5%)</option>
          <option value="0.25">0.25 (25%)</option>
          <option value="0.5">0.5 (50%)</option>
        </select>
      </div>
      <div class="row">
        <label>startGain</label>
        <input type="range" id="sw-startGain" min="0.01" max="1" step="0.01" value="0.2">
        <input type="number" id="sw-startGain-n" step="0.01" value="0.2">
      </div>
      <div class="row">
        <label>envelopeType</label>
        <select id="sw-envelopeType">
          <option value="exponential">exponential</option>
          <option value="linear">linear</option>
        </select>
      </div>
    </div>
  </div>

  <!-- =============== MultiNote =============== -->
  <div class="section disabled" id="section-multi">
    <label class="section-header">
      <input type="checkbox" id="use-multi">
      MultiNote（メロディ）
    </label>
    <div class="section-body">
      <div class="row">
        <label>waveType</label>
        <select id="mn-waveType">
          <option value="square">square</option>
          <option value="sine">sine</option>
          <option value="triangle">triangle</option>
          <option value="sawtooth">sawtooth</option>
        </select>
      </div>
      <div class="row">
        <label>duty（squareのみ）</label>
        <select id="mn-duty">
          <option value="">なし（50%）</option>
          <option value="0.125">0.125</option>
          <option value="0.25">0.25</option>
          <option value="0.5">0.5</option>
        </select>
      </div>
      <div class="row">
        <label>gain</label>
        <input type="range" id="mn-gain" min="0.01" max="1" step="0.01" value="0.2">
        <input type="number" id="mn-gain-n" step="0.01" value="0.2">
      </div>
      <div style="margin-bottom: 10px;">
        <label style="display:block; color:var(--dim); font-size:12px; margin-bottom:6px;">notes</label>
        <div class="notes-list" id="mn-notes"></div>
        <button class="btn small" onclick="addNote()" style="margin-top:6px;">+ 音符追加</button>
        <div class="hint" style="margin-top:4px;">↕ドラッグで変更・ダブルタップでリセット<br>freq: 周波数(Hz) / dur: 長さ(秒) / gap: 次の音符までの間(秒)</div>
      </div>
    </div>
  </div>

  <!-- =============== NoiseSE =============== -->
  <div class="section disabled" id="section-noise">
    <label class="section-header">
      <input type="checkbox" id="use-noise">
      NoiseSE（ノイズ）
    </label>
    <div class="section-body">
      <div class="row">
        <label>duration (秒)</label>
        <input type="range" id="ns-duration" min="0.01" max="2" step="0.005" value="0.1">
        <input type="number" id="ns-duration-n" step="0.005" value="0.1">
      </div>
      <div class="row">
        <label>startGain</label>
        <input type="range" id="ns-startGain" min="0.01" max="1" step="0.01" value="0.2">
        <input type="number" id="ns-startGain-n" step="0.01" value="0.2">
      </div>
      <div class="row">
        <label>sustainPunch</label>
        <input type="range" id="ns-sustainPunch" min="0" max="2" step="0.05" value="0">
        <input type="number" id="ns-sustainPunch-n" step="0.05" value="0">
      </div>
      <div class="row">
        <label>filterFreq (Hz)</label>
        <input type="range" id="ns-filterFreq" min="0" max="4000" step="10" value="0">
        <input type="number" id="ns-filterFreq-n" step="10" value="0">
      </div>
      <div class="row">
        <label>filterSweep (Hz)</label>
        <input type="range" id="ns-filterSweep" min="-4000" max="4000" step="10" value="0">
        <input type="number" id="ns-filterSweep-n" step="10" value="0">
      </div>
      <div class="row">
        <label>pitchJump (Hz)</label>
        <input type="range" id="ns-pitchJump" min="0" max="4000" step="10" value="0">
        <input type="number" id="ns-pitchJump-n" step="10" value="0">
      </div>
      <div class="hint" style="margin-left:142px;">filterFreq=0のとき LPFなし（既存SEと互換）</div>

      <div class="row">
        <label>bpfFreq (Hz)</label>
        <input type="range" id="ns-bpfFreq" min="0" max="4000" step="10" value="0">
        <input type="number" id="ns-bpfFreq-n" step="10" value="0">
      </div>
      <div class="row">
        <label>bpfFreqSweep (Hz)</label>
        <input type="range" id="ns-bpfFreqSweep" min="-4000" max="4000" step="10" value="0">
        <input type="number" id="ns-bpfFreqSweep-n" step="10" value="0">
      </div>
      <div class="row">
        <label>bpfQ</label>
        <input type="range" id="ns-bpfQ" min="0.1" max="20" step="0.1" value="1">
        <input type="number" id="ns-bpfQ-n" step="0.1" value="1">
      </div>
      <div class="hint" style="margin-left:142px;">bpfFreq=0のとき BPFなし / bpfQ: 高いほどピッチ感が強くなる</div>
    </div>
  </div>

  <!-- =============== Unified (統合シンセ) =============== -->
  <div class="section disabled" id="section-unified">
    <label class="section-header">
      <input type="checkbox" id="use-unified">
      Unified（統合シンセ）
    </label>
    <div class="section-body">
      <div class="row">
        <label>waveType</label>
        <select id="un-waveType">
          <option value="square">square</option>
          <option value="sine">sine</option>
          <option value="triangle">triangle</option>
          <option value="sawtooth">sawtooth</option>
          <option value="noise">noise</option>
        </select>
      </div>
      <div class="row">
        <label>duty（squareのみ）</label>
        <select id="un-duty">
          <option value="">なし（50%）</option>
          <option value="0.125">0.125</option>
          <option value="0.25">0.25</option>
          <option value="0.5">0.5</option>
        </select>
      </div>

      <div class="hint" style="margin-left:142px;">--- エンベロープ ---</div>
      <div class="row">
        <label>attackTime (秒)</label>
        <input type="range" id="un-attackTime" min="0" max="0.5" step="0.005" value="0">
        <input type="number" id="un-attackTime-n" step="0.005" value="0">
      </div>
      <div class="row">
        <label>sustainTime (秒)</label>
        <input type="range" id="un-sustainTime" min="0" max="1" step="0.005" value="0.1">
        <input type="number" id="un-sustainTime-n" step="0.005" value="0.1">
      </div>
      <div class="row">
        <label>sustainPunch</label>
        <input type="range" id="un-sustainPunch" min="0" max="2" step="0.05" value="0">
        <input type="number" id="un-sustainPunch-n" step="0.05" value="0">
      </div>
      <div class="row">
        <label>decayTime (秒)</label>
        <input type="range" id="un-decayTime" min="0" max="1" step="0.005" value="0.1">
        <input type="number" id="un-decayTime-n" step="0.005" value="0.1">
      </div>
      <div class="row">
        <label>masterVolume</label>
        <input type="range" id="un-masterVolume" min="0.01" max="1" step="0.01" value="0.2">
        <input type="number" id="un-masterVolume-n" step="0.01" value="0.2">
      </div>

      <div class="hint" style="margin-left:142px;">--- ピッチ ---</div>
      <div class="row">
        <label>frequencyStart (Hz)</label>
        <input type="range" id="un-frequencyStart" min="20" max="4000" step="1" value="440">
        <input type="number" id="un-frequencyStart-n" value="440">
      </div>
      <div class="row">
        <label>frequencySlide (Hz)</label>
        <input type="range" id="un-frequencySlide" min="-3000" max="3000" step="1" value="0">
        <input type="number" id="un-frequencySlide-n" value="0">
      </div>
      <div class="row">
        <label>slideType</label>
        <select id="un-slideType">
          <option value="exponential">exponential</option>
          <option value="linear">linear</option>
        </select>
      </div>

      <div class="hint" style="margin-left:142px;">--- 変調 ---</div>
      <div class="row">
        <label>vibratoDepth (Hz)</label>
        <input type="range" id="un-vibratoDepth" min="0" max="200" step="1" value="0">
        <input type="number" id="un-vibratoDepth-n" value="0">
      </div>
      <div class="row">
        <label>vibratoSpeed (Hz)</label>
        <input type="range" id="un-vibratoSpeed" min="0" max="60" step="0.5" value="0">
        <input type="number" id="un-vibratoSpeed-n" step="0.5" value="0">
      </div>

      <div class="hint" style="margin-left:142px;">--- 倍音 ---</div>
      <div class="row">
        <label>harmonics</label>
        <input type="range" id="un-harmonics" min="0" max="4" step="1" value="0">
        <input type="number" id="un-harmonics-n" value="0">
      </div>
      <div class="row">
        <label>harmonicsFalloff</label>
        <input type="range" id="un-harmonicsFalloff" min="0.1" max="1" step="0.05" value="0.5">
        <input type="number" id="un-harmonicsFalloff-n" step="0.05" value="0.5">
      </div>

      <div class="hint" style="margin-left:142px;">--- フィルター ---</div>
      <div class="row">
        <label>hpfFreq (Hz)</label>
        <input type="range" id="un-hpfFreq" min="0" max="4000" step="10" value="0">
        <input type="number" id="un-hpfFreq-n" step="10" value="0">
      </div>
      <div class="row">
        <label>hpfSweep (Hz)</label>
        <input type="range" id="un-hpfSweep" min="-4000" max="4000" step="10" value="0">
        <input type="number" id="un-hpfSweep-n" step="10" value="0">
      </div>
      <div class="row">
        <label>lpfFreq (Hz)</label>
        <input type="range" id="un-lpfFreq" min="0" max="4000" step="10" value="0">
        <input type="number" id="un-lpfFreq-n" step="10" value="0">
      </div>
      <div class="row">
        <label>lpfSweep (Hz)</label>
        <input type="range" id="un-lpfSweep" min="-4000" max="4000" step="10" value="0">
        <input type="number" id="un-lpfSweep-n" step="10" value="0">
      </div>
      <div class="row">
        <label>lpfResonance</label>
        <input type="range" id="un-lpfResonance" min="0.1" max="20" step="0.1" value="1">
        <input type="number" id="un-lpfResonance-n" step="0.1" value="1">
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast">コピーしました</div>

<script>
// ================================================================
// Audio Engine
// ================================================================
const Audio = {
  ctx: null, masterGain: null, waveCache: {},
  ensureContext() {
    if (!this.ctx) {
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();
      this.masterGain = this.ctx.createGain();
      this.masterGain.gain.value = 0.3;
      this.masterGain.connect(this.ctx.destination);
    }
    if (this.ctx.state === 'suspended') this.ctx.resume();
  },
  _pulseWave(duty) {
    const key = `pulse_${duty}`;
    if (!this.waveCache[key]) {
      const n = 4096;
      const real = new Float32Array(n);
      const imag = new Float32Array(n);
      for (let i = 1; i < n; i++) imag[i] = (2 / (i * Math.PI)) * Math.sin(i * Math.PI * duty);
      this.waveCache[key] = this.ctx.createPeriodicWave(real, imag);
    }
    return this.waveCache[key];
  },
  playUnifiedSE(config) {
    this.ensureContext();
    if (config.notes && config.notes.length > 0) {
      const baseCfg = { ...config };
      delete baseCfg.notes;
      let t = config.startTime != null ? config.startTime : this.ctx.currentTime;
      for (const note of config.notes) {
        this.playUnifiedSE({
          ...baseCfg,
          sustainTime: note.duration,
          frequencyStart: note.freq,
          frequencySlide: 0,
          startTime: t
        });
        t += note.duration + (note.spacing || 0);
      }
      return;
    }
    if ((config.repeatCount || 1) > 1 && config.segmentDuration) {
      const baseCfg = { ...config };
      delete baseCfg.repeatCount;
      delete baseCfg.segmentDuration;
      baseCfg.sustainTime = config.segmentDuration;
      const t0 = config.startTime != null ? config.startTime : this.ctx.currentTime;
      for (let i = 0; i < config.repeatCount; i++) {
        this.playUnifiedSE({ ...baseCfg, startTime: t0 + config.segmentDuration * i });
      }
      return;
    }
    const {
      waveType = 'square', duty = null,
      envelopeMode = 'adsr',
      attackTime = 0, sustainTime = 0.1, sustainPunch = 0, decayTime = 0.1,
      masterVolume = 0.2,
      frequencyStart = 440, frequencySlide = 0, slideType = 'exponential',
      vibratoDepth = 0, vibratoSpeed = 0,
      harmonics = 0, harmonicsFalloff = 0.5,
      hpfFreq = 0, hpfSweep = 0,
      lpfFreq = 0, lpfSweep = 0, lpfResonance = 1, lpfPitchJump = 0,
      bpfFreq = 0, bpfSweep = 0, bpfQ = 1,
      startTime = null
    } = config;
    const isLegacy = envelopeMode === 'legacy4step';
    const totalDur = isLegacy
      ? Math.max(0.01, sustainTime)
      : Math.max(0.01, attackTime + sustainTime + decayTime);
    const t0 = startTime != null ? startTime : this.ctx.currentTime;
    const isNoise = waveType === 'noise';
    const sources = [];
    if (isNoise) {
      const bufSize = Math.max(1, Math.floor(this.ctx.sampleRate * totalDur));
      const buf = this.ctx.createBuffer(1, bufSize, this.ctx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
      const src = this.ctx.createBufferSource();
      src.buffer = buf;
      sources.push({ outNode: src, toStart: src, freqParam: null });
    } else {
      const oscCount = 1 + Math.max(0, Math.min(4, Math.floor(harmonics)));
      for (let i = 0; i < oscCount; i++) {
        const osc = this.ctx.createOscillator();
        if (duty && waveType === 'square') osc.setPeriodicWave(this._pulseWave(duty));
        else osc.type = waveType;
        const mult = i + 1;
        const startF = Math.max(20, frequencyStart * mult);
        const endF = Math.max(20, (frequencyStart + frequencySlide) * mult);
        osc.frequency.setValueAtTime(startF, t0);
        if (frequencySlide !== 0) {
          if (slideType === 'exponential') osc.frequency.exponentialRampToValueAtTime(endF, t0 + totalDur);
          else osc.frequency.linearRampToValueAtTime(endF, t0 + totalDur);
        }
        const harmGain = this.ctx.createGain();
        harmGain.gain.value = i === 0 ? 1 : Math.pow(harmonicsFalloff, i);
        osc.connect(harmGain);
        sources.push({ outNode: harmGain, toStart: osc, freqParam: osc.frequency });
      }
    }
    let lfo = null;
    if (!isNoise && vibratoDepth > 0 && vibratoSpeed > 0) {
      lfo = this.ctx.createOscillator();
      const lfoGain = this.ctx.createGain();
      lfo.frequency.value = vibratoSpeed;
      lfoGain.gain.value = vibratoDepth;
      lfo.connect(lfoGain);
      sources.forEach(s => { if (s.freqParam) lfoGain.connect(s.freqParam); });
    }
    const mixer = this.ctx.createGain();
    sources.forEach(s => s.outNode.connect(mixer));
    let chain = mixer;
    if (bpfFreq > 0) {
      const bpf = this.ctx.createBiquadFilter();
      bpf.type = 'bandpass';
      bpf.frequency.setValueAtTime(bpfFreq, t0);
      if (bpfSweep !== 0) bpf.frequency.linearRampToValueAtTime(Math.max(20, bpfFreq + bpfSweep), t0 + totalDur);
      bpf.Q.value = bpfQ;
      chain.connect(bpf); chain = bpf;
    }
    if (hpfFreq > 0) {
      const hpf = this.ctx.createBiquadFilter();
      hpf.type = 'highpass';
      hpf.frequency.setValueAtTime(hpfFreq, t0);
      if (hpfSweep !== 0) hpf.frequency.linearRampToValueAtTime(Math.max(20, hpfFreq + hpfSweep), t0 + totalDur);
      chain.connect(hpf); chain = hpf;
    }
    if (lpfFreq > 0) {
      const lpf = this.ctx.createBiquadFilter();
      lpf.type = 'lowpass';
      lpf.frequency.setValueAtTime(lpfFreq + lpfPitchJump, t0);
      if (lpfPitchJump > 0) lpf.frequency.linearRampToValueAtTime(lpfFreq, t0 + 0.02);
      if (lpfSweep !== 0) lpf.frequency.linearRampToValueAtTime(Math.max(20, lpfFreq + lpfSweep), t0 + totalDur);
      lpf.Q.value = lpfResonance;
      chain.connect(lpf); chain = lpf;
    }
    const envGain = this.ctx.createGain();
    const peakGain = masterVolume * (1 + sustainPunch);
    if (isLegacy) {
      const step = totalDur / 4;
      envGain.gain.setValueAtTime(peakGain, t0);
      envGain.gain.setValueAtTime(masterVolume * 0.6, t0 + step);
      envGain.gain.setValueAtTime(masterVolume * 0.25, t0 + step * 2);
      envGain.gain.setValueAtTime(0.001, t0 + step * 3);
    } else {
      if (attackTime > 0) {
        envGain.gain.setValueAtTime(0.0001, t0);
        envGain.gain.linearRampToValueAtTime(peakGain, t0 + attackTime);
      } else {
        envGain.gain.setValueAtTime(peakGain, t0);
      }
      envGain.gain.setValueAtTime(peakGain, t0 + attackTime);
      if (sustainPunch > 0 && sustainTime > 0) {
        envGain.gain.linearRampToValueAtTime(masterVolume, t0 + attackTime + Math.min(sustainTime, sustainTime * 0.3 + 0.02));
      }
      envGain.gain.setValueAtTime(masterVolume, t0 + attackTime + sustainTime);
      if (decayTime > 0) envGain.gain.linearRampToValueAtTime(0.0001, t0 + totalDur);
    }
    chain.connect(envGain);
    envGain.connect(this.masterGain);
    sources.forEach(s => { s.toStart.start(t0); s.toStart.stop(t0 + totalDur + 0.02); });
    if (lfo) { lfo.start(t0); lfo.stop(t0 + totalDur + 0.02); }
  }
};

// ================================================================
// MultiNote 音符管理
// ================================================================
let notes = [{ freq: 523, duration: 0.05, spacing: 0 }, { freq: 784, duration: 0.07, spacing: 0 }];
function renderNotes() {
  const box = document.getElementById('mn-notes');
  box.innerHTML = '';
  notes.forEach((note, i) => {
    const row = document.createElement('div');
    row.className = 'note-row';
    row.innerHTML = `
      <span class="idx">#${i+1}</span>
      <span style="color:var(--dim);font-size:11px;">freq</span>
      <input type="number" value="${note.freq}" data-i="${i}" data-k="freq">
      <span style="color:var(--dim);font-size:11px;">dur</span>
      <input type="number" step="0.005" value="${note.duration}" data-i="${i}" data-k="duration">
      <span style="color:var(--dim);font-size:11px;">gap</span>
      <input type="number" step="0.005" value="${note.spacing || 0}" data-i="${i}" data-k="spacing">
      <button class="btn small danger" onclick="removeNote(${i})">×</button>
    `;
    box.appendChild(row);
  });
  box.querySelectorAll('input').forEach(inp => {
    inp.addEventListener('input', e => {
      const i = +e.target.dataset.i, k = e.target.dataset.k;
      notes[i][k] = parseFloat(e.target.value) || 0;
      updateOutput();
    });
  });

  const DRAG_DEFAULTS = { freq: 440, duration: 0.05, spacing: 0 };
  const DRAG_STEP     = { freq: 5, duration: 0.005, spacing: 0.005 };
  const DRAG_MIN      = { freq: 20, duration: 0, spacing: 0 };
  const DRAG_MAX      = { freq: 4000, duration: 2, spacing: 1 };
  box.querySelectorAll('input').forEach(inp => {
    let startY, startVal, lastTap = 0;
    inp.addEventListener('touchstart', e => {
      const now = Date.now();
      if (now - lastTap < 300) {
        e.preventDefault();
        const k = inp.dataset.k;
        const def = DRAG_DEFAULTS[k] ?? 0;
        inp.value = def;
        notes[+inp.dataset.i][k] = def;
        updateOutput();
        lastTap = 0;
        return;
      }
      lastTap = now;
      startY = e.touches[0].clientY;
      startVal = parseFloat(inp.value) || 0;
    }, { passive: false });
    inp.addEventListener('touchmove', e => {
      e.preventDefault();
      const k = inp.dataset.k;
      const dy = startY - e.touches[0].clientY;
      let v = startVal + dy * (DRAG_STEP[k] ?? 1);
      v = Math.max(DRAG_MIN[k] ?? 0, Math.min(DRAG_MAX[k] ?? 9999, v));
      if (k === 'freq') v = Math.round(v);
      else v = parseFloat(v.toFixed(3));
      inp.value = v;
      notes[+inp.dataset.i][k] = v;
      updateOutput();
    }, { passive: false });
  });
}
function addNote() { notes.push({ freq: 440, duration: 0.05, spacing: 0 }); renderNotes(); updateOutput(); }
function removeNote(i) { notes.splice(i,1); renderNotes(); updateOutput(); }
function setNotes(arr) {
  notes = arr.map(n => ({ freq: n.freq, duration: n.duration, spacing: n.spacing || 0 }));
  renderNotes();
}
renderNotes();

  const dur = +document.getElementById('sw-duration').value;
  const c = {
    startFreq:  +document.getElementById('sw-startFreq').value,
    endFreq:    +document.getElementById('sw-endFreq').value,
    waveType:   document.getElementById('sw-waveType').value,
    startGain:  +document.getElementById('sw-startGain').value
  };
  if (repeatCount > 1) {
    c.segmentDuration = dur;
    c.repeatCount = repeatCount;
  } else {
    c.duration = dur;
  }
  const duty = document.getElementById('sw-duty').value;
  if (duty) c.duty = +duty;
  const env = document.getElementById('sw-envelopeType').value;
  if (env !== 'exponential') c.envelopeType = env;
  return { repeatCount, config: c };
}

  if (duty) c.duty = +duty;

}

function enabled(kind) { return document.getElementById('use-' + kind).checked; }

// ================================================================
// 再生
// ================================================================
// 3つのUIセクションconfig → playUnifiedSE config へ変換
function sweepToUnified() {
  const { repeatCount, config: c } = getSweepConfig();
  const u = {
    envelopeMode: 'legacy4step',
    waveType: c.waveType,
    frequencyStart: c.startFreq,
    frequencySlide: (c.endFreq ?? c.startFreq) - c.startFreq,
    slideType: c.envelopeType ?? 'exponential',
    masterVolume: c.startGain
  };
  if (c.duty != null) u.duty = c.duty;
  if (repeatCount > 1) { u.repeatCount = repeatCount; u.segmentDuration = c.segmentDuration; }
  else u.sustainTime = c.duration;
  return u;
}
function multiToUnified() {
  const c = getMultiConfig();
  const u = {
    envelopeMode: 'legacy4step',
    waveType: c.waveType,
    masterVolume: c.gain,
    notes: c.notes
  };
  if (c.duty != null) u.duty = c.duty;
  return u;
}
function noiseToUnified() {
  const c = getNoiseConfig();
  const u = {
    envelopeMode: 'legacy4step',
    waveType: 'noise',
    sustainTime: c.duration,
    masterVolume: c.startGain
  };
  if (c.sustainPunch) u.sustainPunch = c.sustainPunch;
  if (c.filterFreq)   u.lpfFreq       = c.filterFreq;
  if (c.filterSweep)  u.lpfSweep      = c.filterSweep;
  if (c.pitchJump)    u.lpfPitchJump  = c.pitchJump;
  if (c.bpfFreq)      u.bpfFreq       = c.bpfFreq;
  if (c.bpfFreqSweep) u.bpfSweep      = c.bpfFreqSweep;
  if (c.bpfQ && c.bpfQ !== 1) u.bpfQ  = c.bpfQ;
  return u;
}

function playAll() {
  if (enabled('sweep')) Audio.playUnifiedSE(sweepToUnified());
  if (enabled('multi')) Audio.playUnifiedSE(multiToUnified());
  if (enabled('noise')) Audio.playUnifiedSE(noiseToUnified());
  if (enabled('unified')) Audio.playUnifiedSE(getUnifiedConfig());
}

function updateOutput() {
  const { repeatCount, config } = getSweepConfig();
  const label = document.getElementById('sw-duration-label');
  const hint = document.getElementById('sw-total-hint');
  if (repeatCount > 1) {
    label.textContent = 'segmentDuration (秒)';
    hint.style.display = '';
    document.getElementById('sw-total').textContent = (config.segmentDuration * repeatCount).toFixed(3);
  } else {
    label.textContent = 'duration (秒)';
    hint.style.display = 'none';
  }
}
updateOutput();

// ================================================================
// コピー
// ================================================================
function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = isError ? 'var(--danger)' : 'var(--accent)';
  t.style.color = isError ? '#fff' : '#000';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1500);
}
function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  let ok = false;
  try { ok = document.execCommand('copy'); } catch(e) {}
  document.body.removeChild(ta);
  return ok;
}
function buildOutputText() {
  const lines = [];
  if (enabled('sweep'))   lines.push('this.playUnifiedSE(' + JSON.stringify(sweepToUnified()) + ');');
  if (enabled('multi'))   lines.push('this.playUnifiedSE(' + JSON.stringify(multiToUnified()) + ');');
  if (enabled('noise'))   lines.push('this.playUnifiedSE(' + JSON.stringify(noiseToUnified()) + ');');
  if (enabled('unified')) lines.push('this.playUnifiedSE(' + JSON.stringify(getUnifiedConfig()) + ');');
  return lines.join('\n');
}
function copyAll() {
  const text = buildOutputText();
  if (!text) { showToast('有効なセクションがありません', true); return; }
  const done = () => showToast('コピーしました');
  const fail = () => {
    if (fallbackCopy(text)) done();
    else { window.prompt('Ctrl+C でコピーしてください:', text); showToast('プロンプトから手動コピーしてください', true); }
  };
  if (navigator.clipboard && window.isSecureContext) navigator.clipboard.writeText(text).then(done).catch(fail);
  else { if (fallbackCopy(text)) done(); else fail(); }
}

// ================================================================
// ランダム
// ================================================================
function rand(min, max) { return Math.random() * (max - min) + min; }
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function randomizeAll() {
  const waves = ['square','square','square','triangle','sawtooth'];
  const duties = ['', '0.125', '0.25', '0.5'];
  if (enabled('sweep')) {
    setV('sw-startFreq', Math.floor(rand(100, 1600)));
    setV('sw-endFreq',   Math.floor(rand(100, 1600)));
    setV('sw-duration',  rand(0.03, 0.23).toFixed(3));
    setV('sw-repeatCount', Math.random() < 0.4 ? Math.floor(rand(2, 10)) : 1);
    setV('sw-startGain', rand(0.1, 0.4).toFixed(2));
    document.getElementById('sw-waveType').value = pick(waves);
    document.getElementById('sw-duty').value = pick(duties);
  }
  if (enabled('multi')) {
    const n = Math.floor(rand(2, 6));
    notes = [];
    for (let i = 0; i < n; i++) {
      notes.push({
        freq: Math.floor(rand(200, 1500)),
        duration: +rand(0.03, 0.12).toFixed(3),
        spacing: Math.random() < 0.3 ? +rand(0.01, 0.04).toFixed(3) : 0
      });
    }
    renderNotes();
    setV('mn-gain', rand(0.1, 0.4).toFixed(2));
    document.getElementById('mn-waveType').value = pick(waves);
    document.getElementById('mn-duty').value = pick(duties);
  }
  if (enabled('noise')) {
    setV('ns-duration',  rand(0.03, 0.5).toFixed(3));
    setV('ns-startGain', rand(0.1, 0.5).toFixed(2));
    setV('ns-sustainPunch', Math.random() < 0.5 ? rand(0, 1).toFixed(2) : 0);
    const useLpf = Math.random() < 0.5;
    setV('ns-filterFreq',  useLpf ? Math.floor(rand(200, 2000)) : 0);
    setV('ns-filterSweep', useLpf ? Math.floor(rand(-1500, 500)) : 0);
    setV('ns-pitchJump',   useLpf && Math.random() < 0.5 ? Math.floor(rand(200, 1000)) : 0);
    const useBpf = Math.random() < 0.5;
    setV('ns-bpfFreq',      useBpf ? Math.floor(rand(200, 1500)) : 0);
    setV('ns-bpfFreqSweep', useBpf ? Math.floor(rand(-1200, 400)) : 0);
    setV('ns-bpfQ',         useBpf ? +rand(0.5, 5).toFixed(1) : 1);
  }
  if (enabled('unified')) {
    const unifiedWaves = ['square','square','sine','triangle','sawtooth','noise'];
    const w = pick(unifiedWaves);
    document.getElementById('un-waveType').value = w;
    document.getElementById('un-duty').value = pick(duties);
    setV('un-attackTime', Math.random() < 0.3 ? +rand(0.005, 0.05).toFixed(3) : 0);
    setV('un-sustainTime', +rand(0.03, 0.2).toFixed(3));
    setV('un-sustainPunch', Math.random() < 0.4 ? +rand(0, 0.6).toFixed(2) : 0);
    setV('un-decayTime', +rand(0.05, 0.3).toFixed(3));
    setV('un-masterVolume', +rand(0.15, 0.35).toFixed(2));
    setV('un-frequencyStart', Math.floor(rand(150, 1500)));
    setV('un-frequencySlide', Math.random() < 0.7 ? Math.floor(rand(-800, 800)) : 0);
    const useVib = Math.random() < 0.3 && w !== 'noise';
    setV('un-vibratoDepth', useVib ? Math.floor(rand(3, 30)) : 0);
    setV('un-vibratoSpeed', useVib ? +rand(5, 30).toFixed(1) : 0);
    const useHarm = Math.random() < 0.3 && w !== 'noise';
    setV('un-harmonics', useHarm ? Math.floor(rand(1, 4)) : 0);
    setV('un-harmonicsFalloff', +rand(0.3, 0.7).toFixed(2));
    const useHpf = Math.random() < 0.3;
    setV('un-hpfFreq', useHpf ? Math.floor(rand(100, 1500)) : 0);
    setV('un-hpfSweep', useHpf && Math.random() < 0.5 ? Math.floor(rand(-1000, 1000)) : 0);
    const useLpf = Math.random() < 0.4;
    setV('un-lpfFreq', useLpf ? Math.floor(rand(300, 3000)) : 0);
    setV('un-lpfSweep', useLpf && Math.random() < 0.5 ? Math.floor(rand(-1500, 500)) : 0);
    setV('un-lpfResonance', useLpf ? +rand(0.5, 5).toFixed(1) : 1);
  }
  updateOutput();
  playAll();
}
</script>
